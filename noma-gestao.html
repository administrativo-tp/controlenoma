<html lang="pt-BR">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.22);
  --green:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --blue:#378ADD;--bl:#E6F1FB;--bd:#185FA5;
  --amber:#EF9F27;--al:#FAEEDA;--ad:#854F0B;
  --red:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  --r:8px;--rl2:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;
  --text:#f0efed;--text2:#a0a09c;--text3:#6b6b67;
  --border:rgba(255,255,255,0.11);--border2:rgba(255,255,255,0.22);
  --gl:#0a2e20;--gd:#5DCAA5;--bl:#0a1e33;--bd:#7BB8F0;
  --al:#2e1f05;--ad:#FAC775;--rl:#2e0a0a;--rd:#F09595;
}}
body{font-family:var(--font);background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
.app{max-width:1140px;margin:0 auto;padding:1.5rem 1rem 4rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;padding-bottom:1rem;border-bottom:1px solid var(--border)}
header h1{font-size:15px;font-weight:600}
header p{font-size:12px;color:var(--text2)}
.nav{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.nav button{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);transition:all .15s}
.nav button.active,.nav button:hover{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.page{display:none}.page.active{display:block}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:1.5rem}
.m{background:var(--bg2);border-radius:var(--r);padding:1rem}
.m .lb{font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.m .vl{font-size:19px;font-weight:600}
.m .sb{font-size:11px;color:var(--text3);margin-top:3px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl2);padding:1rem 1.25rem;margin-bottom:1rem}
.card h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tr:last-child td{border-bottom:none}
tfoot td{font-weight:600;background:var(--bg2);border-top:1px solid var(--border2)}
.spos{color:#3B6D11;font-weight:600}
.sneg{color:var(--rd);font-weight:600}
.sdim{color:var(--text3)}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--r);display:inline-block;font-weight:600}
.bm{background:var(--gl);color:var(--gd)}
.bbv{background:var(--bl);color:var(--bd)}
.bpos{background:var(--gl);color:var(--gd)}
.bneg{background:var(--rl);color:var(--rd)}
.bneutro{background:var(--bg2);color:var(--text2)}
.fb{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fb select,.fb input{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:var(--font)}
.sbox{background:var(--bg2);border-radius:var(--r);padding:11px 14px;font-size:12px;color:var(--text2)}
.sbox .row{display:flex;justify-content:space-between;padding:3px 0}
.sbox .row.tot{font-weight:600;color:var(--text);border-top:1px solid var(--border);margin-top:5px;padding-top:7px}
.div{border:none;border-top:1px solid var(--border);margin:1rem 0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg1{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.fgp{display:flex;flex-direction:column;gap:4px}
.fgp label{font-size:12px;color:var(--text2);font-weight:500}
.fgp input,.fgp select{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);width:100%;font-family:var(--font)}
.fgp input:focus,.fgp select:focus{outline:none;border-color:var(--blue)}
.btn{background:var(--bg2);color:var(--text);border:1px solid var(--border2);padding:9px 20px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font)}
.btn:hover{background:var(--bg3)}
.btnd{background:transparent;color:var(--rd);border:1px solid var(--red);padding:7px 12px;border-radius:var(--r);cursor:pointer;font-size:12px;font-family:var(--font)}
.alerta{border-radius:var(--rl2);padding:.9rem 1.1rem;margin-bottom:.75rem;border:1px solid}
.al-red{background:var(--rl);border-color:var(--red)}
.al-green{background:var(--gl);border-color:var(--green)}
.al-amber{background:var(--al);border-color:var(--amber)}
.al-blue{background:var(--bl);border-color:var(--blue)}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font)}
.tab.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.tc{display:none}.tc.active{display:block}
.sbar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:6px}
.sbar-f{height:100%;border-radius:3px}
.big-num{font-size:28px;font-weight:700;line-height:1}
.abate-box{background:var(--bg);border:2px solid var(--border2);border-radius:var(--rl2);padding:1.25rem;margin-bottom:1rem}
@media(max-width:640px){.two-col,.three-col,.fg{grid-template-columns:1fr}}
</style>
</head>

function calc(e){
  const ex=Number(e.decor_extra||0),rem=Number(e.remont||0),bou=Number(e.bouquet||0);
  const custos=rem+bou,comNoma=ex*0.10;
  const p=(e.produtor||'').toLowerCase().trim();
  const isCec=p==='cecília'||p==='cecilia'||p==='cissa';
  const comProd=isCec?ex*0.10:(p==='matheus'||p==='joice'||p==='jean')?ex*0.05:0;
  return{ex,rem,bou,custos,comNoma,comProd,saldo:ex-comNoma-comProd-custos};
}

function getMeses(evs){
  const m={};
  evs.forEach(e=>{
    const k=`${e.ano}-${String(e.mes).padStart(2,'0')}`;
    if(!m[k])m[k]={k,ex:0,saldo:0,comNoma:0,comProd:0,comCec:0,comMat:0,comJoi:0,custos:0,ev:0,moema:0,bv:0};
    const c=calc(e);
    m[k].ex+=c.ex;m[k].saldo+=c.saldo;m[k].comNoma+=c.comNoma;
    m[k].comProd+=c.comProd;m[k].custos+=c.custos;m[k].ev++;
    if(e.unidade==='Boa Vista')m[k].bv+=c.ex;else m[k].moema+=c.ex;
    const p=(e.produtor||'').toLowerCase().trim();
    if(p==='cecília'||p==='cecilia'||p==='cissa')m[k].comCec+=c.comProd;
    else if(p==='matheus')m[k].comMat+=c.comProd;
    else if(p==='joice')m[k].comJoi+=c.comProd;
  });
  return Object.values(m).sort((a,b)=>a.k.localeCompare(b.k));
}

let _tt=null;
function _mkTT(html){
  hideTT();
  _tt=document.createElement('div');
  _tt.style.cssText='position:fixed;z-index:9999;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.15);pointer-events:none;min-width:220px;line-height:1.6';
  _tt.innerHTML=html;
  document.body.appendChild(_tt);
}
function _positionTT(e){
  if(!_tt)return;
  const x=e.clientX,y=e.clientY,tw=_tt.offsetWidth,th=_tt.offsetHeight;
  let left=x+14,top=y-th/2;
  if(left+tw>window.innerWidth-10)left=x-tw-14;
  if(top<10)top=10;
  if(top+th>window.innerHeight-10)top=window.innerHeight-th-10;
  _tt.style.left=left+'px';_tt.style.top=top+'px';
}
function hideTT(){if(_tt){_tt.remove();_tt=null;}}

function showTT(e,unidade,dif,com,pago,saldo){
  const saldoPrev=saldo-(dif+com-pago);
  _mkTT(`<div style="font-weight:600;margin-bottom:6px;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.04em">Como este saldo foi formado</div>
    <div style="display:flex;justify-content:space-between;gap:16px;padding:2px 0"><span style="color:var(--text2)">Saldo anterior</span><span>${fmt(saldoPrev)}</span></div>
    ${dif!==0?`<div style="display:flex;justify-content:space-between;gap:16px;padding:2px 0"><span style="color:var(--text2)">+ Dif. a repassar p/ Taís</span><span style="color:#3B6D11">+ ${fmt(dif)}</span></div>`:''}

    ${pago!==0?`<div style="display:flex;justify-content:space-between;gap:16px;padding:2px 0"><span style="color:var(--text2)">− Noma pagou à Taís</span><span style="color:var(--rd)">− ${fmt(pago)}</span></div>`:''}
    <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;gap:16px;font-weight:600"><span>Saldo acumulado</span><span class="${saldo>=0?'spos':'sneg'}">${fmt(saldo)}</span></div>`);

  </div>`;

function tabelaConsolidada(){
  const mapa={};
  SALDOS.forEach(s=>{
    const k=`${s.a}-${String(s.mn).padStart(2,'0')}`;
    if(!mapa[k])mapa[k]={a:s.a,m:s.m,mn:s.mn,dif:0,com:0,pago:0,smoe:null,sbv:null};
    mapa[k].dif+=s.dif;mapa[k].com+=s.com;mapa[k].pago+=s.pago;
    if(s.u==='Moema')mapa[k].smoe=s.saldo;
    if(s.u==='Boa Vista')mapa[k].sbv=s.saldo;
  });
  const rows=Object.values(mapa).sort((a,b)=>a.a!==b.a?b.a-a.a:b.mn-a.mn).map(r=>{
    const ms=r.smoe!==null?`<span class="${r.smoe>0.5?'spos':r.smoe<-0.5?'sneg':'sdim'}">${fmt(r.smoe)}</span>`:`<span class="sdim">—</span>`;
    const bs=r.sbv!==null?`<span class="${r.sbv>0.5?'spos':r.sbv<-0.5?'sneg':'sdim'}">${fmt(r.sbv)}</span>`:`<span class="sdim">—</span>`;
    const cv=(r.smoe??0)+(r.sbv??0);
    const cs=r.smoe!==null||r.sbv!==null?`<span class="${cv>0.5?'spos':cv<-0.5?'sneg':'sdim'};font-weight:600">${fmt(cv)}</span>`:`<span class="sdim">—</span>`;
    return`<tr><td>${r.a}</td><td>${r.m}</td><td>${r.dif>0?fmt(r.dif):'—'}</td><td>${r.com>0?fmt(r.com):'—'}</td><td>${r.pago!==0?fmt(r.pago):'—'}</td><td>${ms}</td><td>${bs}</td><td>${cs}</td></tr>`;
  }).join('');
  return`<div class="card" style="padding:0 .5rem">
    <div style="padding:1rem .75rem .5rem;font-size:13px;font-weight:600">Visão consolidada — ambas as unidades (mais recente primeiro)</div>
    <div class="tw"><table>
      <thead><tr><th>Ano</th><th>Mês</th><th>Dif. repassar</th><th>Com. extras</th><th>Noma pagou</th><th>Saldo Moema</th><th>Saldo BV</th><th>Consolidado</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:1rem;padding:0 .25rem">
    Consolidado = soma dos saldos. Positivo = Noma deve à Taís. Negativo = Taís deve à Noma.
  </div>`;
}

function fEV(){
  const u=document.getElementById('fu')?.value||'',p=document.getElementById('fp')?.value,a=document.getElementById('fa')?.value||'',m=document.getElementById('fm')?.value||'',st=document.getElementById('fst')?.value||'';
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  function statusEv(e){const d=new Date(e.data+'T12:00:00');return d<hoje?'realizado':'a realizar';}
  let f=allEvs().filter(e=>{
    if(u&&e.unidade!==u)return false;
    if(p!==undefined&&p!==''&&e.produtor!==p)return false;
    if(a&&String(e.ano)!==a)return false;
    if(m){const mk=`${e.ano}-${String(e.mes).padStart(2,'0')}`;if(mk!==m)return false;}
    if(st&&statusEv(e)!==st)return false;
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));
  const tE=f.reduce((s,e)=>s+Number(e.decor_extra||0),0),tS=f.reduce((s,e)=>s+calc(e).saldo,0);
  const isNew=id=>newEvs.some(n=>n.id===id);
  document.getElementById('evtb').innerHTML=f.length===0?'<div style="text-align:center;padding:3rem;color:var(--text3)">Nenhum evento encontrado.</div>':
    `<div class="card" style="padding:0 .5rem"><div class="tw"><table>
      <thead><tr><th>Data</th><th>Noivos</th><th>Unidade</th><th>Produtor</th><th>Status</th><th>Extras</th><th>Descontos</th><th>Saldo Taís</th><th></th></tr></thead>
      <tbody>${f.map(e=>{const c=calc(e);const s=statusEv(e);return`<tr>
        <td>${new Date(e.data+'T12:00:00').toLocaleDateString('pt-BR')}</td>
        <td>${e.noivos}</td>
        <td><span class="badge ${e.unidade==='Moema'?'bm':'bbv'}">${e.unidade}</span></td>
        <td>${e.produtor||'<span style="color:var(--text3)">—</span>'}</td>
        <td><span class="badge ${s==='realizado'?'bpos':'bneutro'}">${s==='realizado'?'Realizado':'A realizar'}</span></td>
        <td>${fmt(c.ex)}</td>
        <td style="color:var(--text3)">− ${fmt(c.comNoma+c.comProd+c.custos)}</td>
        <td class="spos">${fmt(c.saldo)}</td>
        <td>${isNew(e.id)?`<button onclick="editEV('${e.id}')" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;font-family:var(--font)">Editar</button>`:''}</td>
      </tr>`;}).join('')}</tbody>
      <tfoot><tr><td colspan="5">${f.length} evento(s)</td><td>${fmt(tE)}</td><td></td><td class="spos">${fmt(tS)}</td><td></td></tr></tfoot>
    </table></div></div>`;
}
function editEV(id){P('nv');rNV(id);}

// ── COMISSÕES ─────────────────────────────────────────────────────────────────
function rCO(){
  const el=document.getElementById('co'),evs=allEvs(),aC=evs.map(e=>({...e,...calc(e)}));
  const tN=aC.reduce((s,e)=>s+e.comNoma,0);
  const tC=aC.filter(e=>{const p=(e.produtor||'').toLowerCase();return p==='cecília'||p==='cecilia'||p==='cissa';}).reduce((s,e)=>s+e.comProd,0);
  const tM=aC.filter(e=>(e.produtor||'').toLowerCase()==='matheus').reduce((s,e)=>s+e.comProd,0);
  const tJ=aC.filter(e=>(e.produtor||'').toLowerCase()==='joice').reduce((s,e)=>s+e.comProd,0);
  const ms=getMeses(evs).reverse();
  const allMeses=[...new Set(evs.map(e=>`${e.ano}-${String(e.mes).padStart(2,'0')}`))].sort().reverse();
  el.innerHTML=`
    <div class="mg">
      <div class="m"><div class="lb">Noma (10%)</div><div class="vl">${fmt(tN)}</div></div>
      <div class="m"><div class="lb">Cecília (10%)</div><div class="vl">${fmt(tC)}</div></div>
      <div class="m"><div class="lb">Matheus (5%)</div><div class="vl">${fmt(tM)}</div></div>
      <div class="m"><div class="lb">Joice (5%)</div><div class="vl">${fmt(tJ)}</div></div>
    </div>
    <div class="fb">
      <select id="co-fm" onchange="fCO()"><option value="">Todos os meses</option>${allMeses.map(m=>{const[a,mo]=m.split('-');return`<option value="${m}">${new Date(a,mo-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</option>`;}).join('')}</select>
    </div>
    <div class="card" style="padding:0 .5rem" id="co-table">
    </div>`;
  fCO();
}

function fCO(){
  const filtMes=document.getElementById('co-fm')?.value||'';
  const evs=allEvs();
  const ms=getMeses(evs).reverse();
  const filtered=filtMes?ms.filter(m=>m.k===filtMes):ms;
  const tN=filtered.reduce((s,m)=>s+m.comNoma,0);
  const tC=filtered.reduce((s,m)=>s+m.comCec,0);
  const tM=filtered.reduce((s,m)=>s+m.comMat,0);
  const tJ=filtered.reduce((s,m)=>s+m.comJoi,0);
  document.getElementById('co-table').innerHTML=`
    <div style="padding:1rem .75rem .5rem;font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em">Comissões por mês</div>
    <div class="tw"><table>
      <thead><tr><th>Mês</th><th>Eventos</th><th>Noma (10%)</th><th>Cecília (10%)</th><th>Matheus (5%)</th><th>Joice (5%)</th><th>Total</th></tr></thead>
      <tbody>${filtered.map(m=>`<tr>
        <td>${new Date(m.k+'-01T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</td>
        <td>${m.ev}</td><td>${fmt(m.comNoma)}</td><td>${fmt(m.comCec)}</td>
        <td>${fmt(m.comMat)}</td><td>${fmt(m.comJoi)}</td>
        <td>${fmt(m.comNoma+m.comCec+m.comMat+m.comJoi)}</td></tr>`).join('')}</tbody>
      <tfoot><tr><td>Total</td><td>${filtered.reduce((s,m)=>s+m.ev,0)}</td><td>${fmt(tN)}</td><td>${fmt(tC)}</td><td>${fmt(tM)}</td><td>${fmt(tJ)}</td><td>${fmt(tN+tC+tM+tJ)}</td></tr></tfoot>
    </table></div>`;
}

// ── CUSTOS ────────────────────────────────────────────────────────────────────
function rCU(){
  const el=document.getElementById('cu');
  if(!window._cuSort) window._cuSort='desc';
  const raw=allEvs().filter(e=>Number(e.remont||0)+Number(e.bouquet||0)>0);
  const evs=[...raw].sort((a,b)=>window._cuSort==='asc'?a.data.localeCompare(b.data):b.data.localeCompare(a.data));
  const tR=evs.reduce((s,e)=>s+Number(e.remont||0),0),tB=evs.reduce((s,e)=>s+Number(e.bouquet||0),0);
  const arrow=window._cuSort==='asc'?'↑':'↓';
  el.innerHTML=`
    <div class="mg">
      <div class="m"><div class="lb">Remontagem e outros</div><div class="vl">${fmt(tR)}</div></div>
      <div class="m"><div class="lb">Bouquet cortesia</div><div class="vl">${fmt(tB)}</div></div>
      <div class="m"><div class="lb">Total repassado</div><div class="vl">${fmt(tR+tB)}</div><div class="sb">${evs.length} eventos com custos</div></div>
    </div>
    <div class="card" style="padding:0 .5rem"><div class="tw"><table>
      <thead><tr>
        <th style="cursor:pointer;user-select:none" onclick="window._cuSort=window._cuSort==='asc'?'desc':'asc';rCU()">Data ${arrow}</th>
        <th>Noivos</th><th>Unidade</th><th>Produtor</th><th>Remontagem</th><th>Bouquet</th><th>Total</th>
      </tr></thead>
      <tbody>${evs.map(e=>`<tr>
        <td>${new Date(e.data+'T12:00:00').toLocaleDateString('pt-BR')}</td>
        <td>${e.noivos}</td>
        <td><span class="badge ${e.unidade==='Moema'?'bm':'bbv'}">${e.unidade}</span></td>
        <td>${e.produtor||'—'}</td>
        <td>${Number(e.remont||0)>0?fmt(e.remont):'—'}</td>
        <td>${Number(e.bouquet||0)>0?fmt(e.bouquet):'—'}</td>
        <td style="font-weight:600">${fmt(Number(e.remont||0)+Number(e.bouquet||0))}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td colspan="4">Total</td><td>${fmt(tR)}</td><td>${fmt(tB)}</td><td>${fmt(tR+tB)}</td></tr></tfoot>
    </table></div></div>`;
}

// ── NOVO EVENTO ───────────────────────────────────────────────────────────────
function rNV(editId){
  const el=document.getElementById('nv');
  const ev=editId?newEvs.find(e=>e.id===editId):null;
  el.innerHTML=`<div class="card">
    <h3>${ev?'Editar — '+ev.noivos:'Cadastrar novo evento'}</h3>
    <div class="fg">
      <div class="fgp"><label>Noivos / Nome do evento</label><input type="text" id="fn" value="${ev?ev.noivos:''}" placeholder="Ana e João"></div>
      <div class="fgp"><label>Data do evento</label><input type="date" id="fd" value="${ev?ev.data:''}"></div>
      <div class="fgp"><label>Unidade Noma</label><select id="fu2"><option value="Moema" ${!ev||ev.unidade==='Moema'?'selected':''}>Noma Moema</option><option value="Boa Vista" ${ev?.unidade==='Boa Vista'?'selected':''}>Noma Boa Vista</option></select></div>
      <div class="fgp"><label>Produtor(a)</label><select id="fp2" onchange="cR()"><option value="">Selecione</option><option value="Cecília" ${ev?.produtor==='Cecília'?'selected':''}>Cecília (comissão 10%)</option><option value="Matheus" ${ev?.produtor==='Matheus'?'selected':''}>Matheus (comissão 5%)</option><option value="Joice" ${ev?.produtor==='Joice'?'selected':''}>Joice (comissão 5%)</option></select></div>
      <div class="fgp"><label>Valor fechado (R$)</label><input type="number" id="fvf" value="${ev?.valor_evento||''}" placeholder="0,00"></div>
      <div class="fgp"><label>Valor pago pelos noivos (R$)</label><input type="number" id="fvp" value="${ev?.valor_pago||''}" placeholder="0,00"></div>
    </div>
    <hr class="div">
    <p style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Decor Extra TP</p>
    <div class="fg1"><div class="fgp"><label>Valor total dos extras vendidos (R$)</label><input type="number" id="fex" value="${ev?.decor_extra||''}" placeholder="0,00" oninput="cR()"></div></div>
    <hr class="div">
    <p style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Custos repassados</p>
    <div class="fg">
      <div class="fgp"><label>Remontagem e outros Noma (R$)</label><input type="number" id="frem" value="${ev?.remont||''}" placeholder="0,00" oninput="cR()"></div>
      <div class="fgp"><label>Bouquet cortesia (R$)</label><input type="number" id="fbou" value="${ev?.bouquet||''}" placeholder="0,00" oninput="cR()"></div>
    </div>
    <div class="fgp" style="margin-bottom:1.5rem"><label>Observações</label><input type="text" id="fobs" value="${ev?.obs||''}" placeholder="Notas sobre o evento..."></div>
    <div id="rc" style="margin-bottom:1.5rem"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="sEV('${editId||''}')">Salvar evento</button>
      ${ev?`<button class="btnd" onclick="dEV('${editId}')">Excluir</button>`:''}
      <button onclick="P('ev')" style="background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font)">Cancelar</button>
    </div>
  </div>`;
  cR();
}

function cR(){
  const ex=Number(document.getElementById('fex')?.value||0);
  const rem=Number(document.getElementById('frem')?.value||0);
  const bou=Number(document.getElementById('fbou')?.value||0);
  const prod=(document.getElementById('fp2')?.value||'').toLowerCase();
  const comN=ex*0.10,comP=prod==='cecília'||prod==='cecilia'?ex*0.10:(prod==='matheus'||prod==='joice')?ex*0.05:0;
  const custos=rem+bou,saldo=ex-comN-comP-custos;
  const box=document.getElementById('rc');
  if(!box||(ex===0&&custos===0)){if(box)box.innerHTML='';return;}
  box.innerHTML=`<div class="sbox">
    <div class="row"><span>Decor Extra TP</span><span>${fmt(ex)}</span></div>
    <div class="row" style="font-size:11px;color:var(--text3)"><span>→ Comissão Noma (10%)</span><span>− ${fmt(comN)}</span></div>
    ${comP>0?`<div class="row" style="font-size:11px;color:var(--text3)"><span>→ Comissão produtor(a)</span><span>− ${fmt(comP)}</span></div>`:''}
    ${custos>0?`<div class="row" style="font-size:11px;color:var(--text3)"><span>→ Custos repassados</span><span>− ${fmt(custos)}</span></div>`:''}
    <div class="row tot"><span>Saldo Taís Puntel</span><span class="spos">${fmt(saldo)}</span></div>
  </div>`;
}

function sEV(editId){
  const noivos=document.getElementById('fn').value.trim(),data=document.getElementById('fd').value;
  const unidade=document.getElementById('fu2').value,produtor=document.getElementById('fp2').value;
  if(!noivos||!data){alert('Preencha pelo menos o nome e a data.');return;}
  const d=new Date(data+'T12:00:00');
  const ev={id:editId||Date.now().toString(),noivos,data,unidade,produtor,ano:d.getFullYear(),mes:d.getMonth()+1,
    valor_evento:Number(document.getElementById('fvf').value||0),valor_pago:Number(document.getElementById('fvp').value||0),
    decor_extra:Number(document.getElementById('fex').value||0),remont:Number(document.getElementById('frem').value||0),
    bouquet:Number(document.getElementById('fbou').value||0),obs:document.getElementById('fobs').value};
  if(editId){const i=newEvs.findIndex(e=>e.id===editId);newEvs[i]=ev;}else{newEvs.push(ev);}
  save();alert('Evento salvo com sucesso!');P('ev');
}
function dEV(id){if(!confirm('Excluir este evento?')){return;}newEvs=newEvs.filter(e=>e.id!==id);save();P('ev');}

rDB();
</script>
</body>
</html>
